name: Manual APK Build (Custom Package)

on:
  workflow_dispatch:   # 手动触发
    inputs:
      custom_package:
        description: '自定义包名（留空则使用默认）'
        required: false
        default: 'com.fongmi.android.qilew'
      release_tag:
        description: 'Release Tag（留空自动生成）'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 JDK 21（项目要求）
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # 3. 设置 Python 3.10（Chaquo 必需）
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip   # 可选，缓存 pip 包

      # 4. 设置 Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 5. （可选）动态修改 applicationId
      - name: Modify applicationId
        run: |
          # 获取用户输入的包名，若留空则使用默认（可设置默认值）
          PACKAGE="${{ github.event.inputs.custom_package }}"
          if [ -z "$PACKAGE" ]; then
            PACKAGE="com.fongmi.android.qilew"
          fi
          # 替换所有 flavor 的 applicationId（注意原项目的实际写法）
          sed -i "s/applicationId \".*\"/applicationId \"$PACKAGE\"/g" app/build.gradle
          # 如果原项目有 productFlavors 单独声明，可额外处理（已包含在统一替换中）
          echo "Package name changed to: $PACKAGE"

      # 6. 赋予 gradlew 执行权限并打包
      - name: Build APKs
        run: |
          chmod +x gradlew
          # 三个独立 APK
          ./gradlew :app:assembleMobileArm64_v8aRelease
          ./gradlew :app:assembleLeanbackArmeabi_v7aRelease
          ./gradlew :app:assembleLeanbackArm64_v8aRelease

      # 7. 上传 APK 作为构建产物
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks-custom
          path: app/build/outputs/apk/**/release/*.apk
